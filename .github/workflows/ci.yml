name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install protoc
        # Issue #28: prost-build needs protoc to compile our internal
        # catalog manifest schema. GitHub's ubuntu-latest image does
        # not ship protoc by default.
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --check --all

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test (debug)
        run: cargo test --workspace

      - name: Test (release — catches release-mode UB)
        run: cargo test --workspace --release

  bench:
    name: Benchmarks (PR only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        # Issue #28: prost-build needs protoc; ubuntu-latest does not
        # ship it by default.
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install cargo-criterion
        run: cargo install cargo-criterion

      - name: Run benchmarks
        # cargo-criterion writes bencher-format lines to stderr, not stdout.
        # Stdout carries only the lib crate's spurious "0 measured" output
        # from libtest's bench shim (we have no #[bench] fns; the criterion
        # harness uses [[bench]] targets with harness=false). Capture stderr
        # to output.txt and discard stdout. github-action-benchmark's cargo
        # parser ignores non-bencher lines (Compiling/Finished/Gnuplot…).
        run: cargo criterion --workspace --output-format bencher >/dev/null 2>output.txt

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: cargo
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          comment-on-alert: true
          alert-threshold: "200%"
