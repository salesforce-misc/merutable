name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install protoc
        # Issue #28: prost-build needs protoc to compile our internal
        # catalog manifest schema. GitHub's ubuntu-latest image does
        # not ship protoc by default.
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      # Cargo registry caching removed: actions/cache@v4 was killing
      # the job within 2 minutes of the cache step starting on the
      # current GitHub backend, even with timeout-minutes + continue-
      # on-error set. The bench job — which never used the cache —
      # completes reliably in the same runs, isolating the failure
      # to the cache action itself. Cold compile is ~13 min; cached
      # was ~3 min when it worked. The 10-minute speedup is not
      # worth a flaky CI gate. Re-introduce a cache mechanism (e.g.
      # Swatinem/rust-cache, sccache, or a self-hosted runner with
      # local target/) when the timing actually matters.

      - name: Format check
        run: cargo fmt --check --all

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test (debug)
        run: cargo test --workspace

      - name: Test (release — catches release-mode UB)
        run: cargo test --workspace --release

  bench:
    name: Benchmarks (PR only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        # Issue #28: prost-build needs protoc; ubuntu-latest does not
        # ship it by default.
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install cargo-criterion
        run: cargo install cargo-criterion

      - name: Run benchmarks
        # cargo-criterion writes bencher-format lines to stderr, not stdout.
        # Stdout carries only the lib crate's spurious "0 measured" output
        # from libtest's bench shim (we have no #[bench] fns; the criterion
        # harness uses [[bench]] targets with harness=false). Capture stderr
        # to output.txt and discard stdout.
        run: cargo criterion --workspace --output-format bencher >/dev/null 2>output.txt

      - name: Verify benchmarks ran
        # The bench job runs only on pull_request, so we don't try to
        # store history in gh-pages or compare against a baseline (that
        # would need a push-to-main trigger to populate the baseline).
        # Validation here is: bencher-format lines exist in output.txt,
        # i.e. every bench actually executed. Print them for visibility.
        run: |
          echo "::group::output.txt"
          cat output.txt
          echo "::endgroup::"
          if ! grep -q 'ns/iter' output.txt; then
            echo "::error::No bencher-format results in output.txt"
            exit 1
          fi
          echo "Bench targets that ran:"
          grep 'ns/iter' output.txt
