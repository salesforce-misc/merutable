<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 900" font-family="system-ui,-apple-system,Helvetica,Arial,sans-serif" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#546E7A"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C62828"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="900" fill="#FAFAFA" rx="8"/>

  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#212121">merutable — LSM + Iceberg-compatible export Architecture</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 1 (y=50..410): Write Path + LSM Levels + Iceberg  -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- ── LEFT: Write Path ── -->
  <text x="50" y="60" font-size="11" font-weight="bold" fill="#1565C0">WRITE PATH</text>

  <rect x="20" y="70" width="200" height="36" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="120" y="89" text-anchor="middle" font-weight="600" fill="#0D47A1">MeruDB API</text>
  <text x="120" y="101" text-anchor="middle" font-size="9" fill="#546E7A">put / delete / get / scan</text>

  <line x1="60" y1="106" x2="60" y2="126" stroke="#546E7A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="172" y1="106" x2="172" y2="126" stroke="#546E7A" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="20" y="128" width="80" height="28" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="60" y="147" text-anchor="middle" font-size="10" fill="#BF360C">WAL</text>

  <rect x="115" y="128" width="115" height="36" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="172" y="145" text-anchor="middle" font-size="10" fill="#1B5E20">Memtable</text>
  <text x="172" y="157" text-anchor="middle" font-size="8" fill="#4CAF50">skip-list (lock-free)</text>

  <!-- ── CENTER: LSM Levels ── -->
  <text x="280" y="60" font-size="11" font-weight="bold" fill="#2E7D32">LSM LEVELS</text>

  <!-- L0 -->
  <rect x="240" y="70" width="310" height="85" rx="6" fill="none" stroke="#78909C" stroke-width="1" stroke-dasharray="4"/>
  <text x="250" y="85" font-size="11" font-weight="bold" fill="#37474F">L0 — Rowstore</text>
  <text x="250" y="98" font-size="9" fill="#607D8B">8 KiB pages · PLAIN encoding · 4 MiB row groups</text>
  <rect x="250" y="105" width="140" height="40" rx="3" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1"/>
  <text x="320" y="119" text-anchor="middle" font-size="9" font-weight="600" fill="#1565C0">_merutable_ikey</text>
  <text x="320" y="131" text-anchor="middle" font-size="8" fill="#1976D2">_merutable_value (blob)</text>
  <text x="320" y="141" text-anchor="middle" font-size="8" fill="#42A5F5">+ typed columns</text>
  <rect x="400" y="105" width="60" height="18" rx="3" fill="#FCE4EC" stroke="#E91E63" stroke-width="0.5"/>
  <text x="430" y="117" text-anchor="middle" font-size="8" fill="#C2185B">Bloom</text>
  <rect x="400" y="127" width="60" height="18" rx="3" fill="#F3E5F5" stroke="#9C27B0" stroke-width="0.5"/>
  <text x="430" y="139" text-anchor="middle" font-size="8" fill="#7B1FA2">KvSparseIdx</text>

  <!-- Arrow: Memtable → L0 -->
  <line x1="230" y1="146" x2="248" y2="146" stroke="#546E7A" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="232" y="141" font-size="8" fill="#E65100">flush</text>

  <!-- Arrow: L0 → L1 -->
  <line x1="395" y1="157" x2="395" y2="196" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="405" y="181" font-size="9" fill="#E65100">compact</text>

  <!-- L1 -->
  <rect x="240" y="200" width="310" height="75" rx="6" fill="none" stroke="#78909C" stroke-width="1" stroke-dasharray="4"/>
  <text x="250" y="215" font-size="11" font-weight="bold" fill="#37474F">L1 — Warm</text>
  <text x="250" y="228" font-size="9" fill="#607D8B">32 KiB pages · per-column encodings · 32 MiB row groups</text>
  <rect x="250" y="235" width="140" height="30" rx="3" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1"/>
  <text x="320" y="249" text-anchor="middle" font-size="9" font-weight="600" fill="#2E7D32">_merutable_ikey</text>
  <text x="320" y="260" text-anchor="middle" font-size="8" fill="#43A047">typed columns only</text>
  <rect x="400" y="235" width="60" height="13" rx="3" fill="#FCE4EC" stroke="#E91E63" stroke-width="0.5"/>
  <text x="430" y="245" text-anchor="middle" font-size="7" fill="#C2185B">Bloom</text>
  <rect x="400" y="251" width="60" height="13" rx="3" fill="#F3E5F5" stroke="#9C27B0" stroke-width="0.5"/>
  <text x="430" y="261" text-anchor="middle" font-size="7" fill="#7B1FA2">KvSparseIdx</text>
  <!-- Arrow: L1 → L2+ -->
  <line x1="395" y1="277" x2="395" y2="316" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="405" y="301" font-size="9" fill="#E65100">compact</text>

  <!-- L2+ -->
  <rect x="240" y="320" width="310" height="75" rx="6" fill="none" stroke="#78909C" stroke-width="1" stroke-dasharray="4"/>
  <text x="250" y="335" font-size="11" font-weight="bold" fill="#37474F">L2+ — Columnstore</text>
  <text x="250" y="348" font-size="9" fill="#607D8B">128 KiB pages · DELTA/SPLIT/DICT · 128 MiB row groups</text>
  <rect x="250" y="355" width="290" height="30" rx="3" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1"/>
  <text x="395" y="368" text-anchor="middle" font-size="9" font-weight="600" fill="#2E7D32">Analytics-optimized typed columns</text>
  <text x="395" y="379" text-anchor="middle" font-size="7" fill="#43A047">DELTA_BINARY_PACKED · BYTE_STREAM_SPLIT · RLE_DICTIONARY</text>

  <!-- ── RIGHT: Iceberg export ── -->
  <text x="620" y="60" font-size="11" font-weight="bold" fill="#6A1B9A">ICEBERG</text>

  <rect x="600" y="70" width="200" height="55" rx="4" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1.5"/>
  <text x="700" y="88" text-anchor="middle" font-size="10" font-weight="600" fill="#4A148C">export_iceberg(path)</text>
  <text x="700" y="101" text-anchor="middle" font-size="8" fill="#7B1FA2">metadata.json · manifest-list · manifest</text>
  <text x="700" y="113" text-anchor="middle" font-size="8" fill="#7B1FA2">format-version = 2</text>

  <!-- Arrow: LSM → Manifest -->
  <line x1="552" y1="97" x2="598" y2="97" stroke="#6A1B9A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── RIGHT: Acceleration Structures ── -->
  <rect x="590" y="210" width="500" height="120" rx="8" fill="#EDE7F6" stroke="#5E35B1" stroke-width="1"/>
  <text x="840" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="#4527A0">Acceleration Structures</text>

  <rect x="610" y="242" width="220" height="30" rx="4" fill="#FCE4EC" stroke="#E91E63" stroke-width="1"/>
  <text x="720" y="258" text-anchor="middle" font-size="9" font-weight="600" fill="#880E4F">FastLocalBloom (AVX2/NEON SIMD)</text>
  <text x="720" y="268" text-anchor="middle" font-size="8" fill="#AD1457">64-byte cache-line-aligned buckets</text>

  <rect x="610" y="277" width="220" height="30" rx="4" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1"/>
  <text x="720" y="293" text-anchor="middle" font-size="9" font-weight="600" fill="#6A1B9A">KvSparseIndex (prefix-compressed)</text>
  <text x="720" y="303" text-anchor="middle" font-size="8" fill="#7B1FA2">restart-point binary search · full keys</text>

  <rect x="860" y="247" width="210" height="52" rx="4" fill="white" stroke="#5E35B1" stroke-width="0.5"/>
  <text x="965" y="262" text-anchor="middle" font-size="8" fill="#311B92">Point lookup flow:</text>
  <text x="965" y="274" text-anchor="middle" font-size="8" fill="#4527A0">1. Bloom → miss? skip entire file</text>
  <text x="965" y="286" text-anchor="middle" font-size="8" fill="#4527A0">2. KvSparseIndex → skip pages</text>
  <text x="965" y="297" text-anchor="middle" font-size="8" fill="#4527A0">3. Scan ≤ 1 restart interval</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ROW 2 (y=430..580): External analytical reads — full-width section -->
  <!-- ═══════════════════════════════════════════════ -->

  <rect x="30" y="430" width="1040" height="140" rx="8" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5"/>
  <text x="550" y="455" text-anchor="middle" font-size="14" font-weight="bold" fill="#F57F17">External analytical reads — Zero ETL</text>

  <rect x="80" y="475" width="150" height="40" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="155" y="494" text-anchor="middle" font-size="10" font-weight="600" fill="#1B5E20">merutable</text>
  <text x="155" y="507" text-anchor="middle" font-size="8" fill="#2E7D32">put() / put_batch() / flush()</text>

  <line x1="232" y1="495" x2="278" y2="495" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="280" y="475" width="130" height="40" rx="4" fill="#ECEFF1" stroke="#78909C" stroke-width="1.5"/>
  <text x="345" y="494" text-anchor="middle" font-size="10" font-weight="bold" fill="#37474F">Parquet Files</text>
  <text x="345" y="507" text-anchor="middle" font-size="8" fill="#546E7A">same bytes on disk</text>

  <line x1="412" y1="495" x2="458" y2="495" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <rect x="460" y="470" width="200" height="50" rx="4" fill="#FCE4EC" stroke="#C62828" stroke-width="1"/>
  <text x="560" y="490" text-anchor="middle" font-size="10" font-weight="600" fill="#B71C1C">DuckDB · Spark · Trino</text>
  <text x="560" y="503" text-anchor="middle" font-size="8" fill="#C62828">SELECT * FROM read_parquet(...)</text>
  <text x="560" y="515" text-anchor="middle" font-size="8" fill="#E53935">no ETL · no format conversion</text>

  <text x="700" y="490" font-size="9" fill="#37474F" font-style="italic">Read: memtable → L0 (bloom → KvSparseIndex) → L1+</text>
  <text x="700" y="504" font-size="9" fill="#37474F" font-style="italic">Write: WAL → memtable → flush → native manifest</text>

  <text x="550" y="550" text-anchor="middle" font-size="10" fill="#F57F17" font-weight="600">db.export_iceberg(path) emits a spec-clean Iceberg v2 chain on demand.</text>
  <text x="550" y="563" text-anchor="middle" font-size="9" fill="#795548">metadata.json + manifest-list Avro + manifest Avro → DuckDB iceberg_scan, pyiceberg, Spark, Trino.</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 3 (y=600..790): Per-Level Parquet Format — detail -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <rect x="30" y="600" width="1040" height="170" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="550" y="622" text-anchor="middle" font-size="12" font-weight="bold" fill="#0D47A1">Per-Level Parquet Format</text>

  <!-- L0 detail -->
  <rect x="50" y="635" width="300" height="120" rx="4" fill="white" stroke="#42A5F5" stroke-width="1"/>
  <text x="200" y="653" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">L0 (Rowstore)</text>
  <text x="65" y="670" font-size="9" fill="#37474F">Pages: 8 KiB · Row groups: 4 MiB</text>
  <text x="65" y="684" font-size="9" fill="#37474F">Encoding: PLAIN on all columns</text>
  <text x="65" y="698" font-size="9" fill="#37474F">Columns: _ikey + _value (blob) + typed</text>
  <text x="65" y="716" font-size="9" fill="#E65100" font-weight="600">Bias: point lookups, fast flush</text>
  <text x="65" y="730" font-size="8" fill="#78909C" font-style="italic">_merutable_value = postcard-encoded row</text>
  <text x="65" y="743" font-size="8" fill="#78909C" font-style="italic">Dropped at L1+ (analytics format only)</text>

  <!-- L1 detail -->
  <rect x="380" y="635" width="310" height="120" rx="4" fill="white" stroke="#66BB6A" stroke-width="1"/>
  <text x="535" y="653" text-anchor="middle" font-size="10" font-weight="bold" fill="#2E7D32">L1 (Warm)</text>
  <text x="395" y="670" font-size="9" fill="#37474F">Pages: 32 KiB · Row groups: 32 MiB</text>
  <text x="395" y="684" font-size="9" fill="#37474F">Encoding: per-column (DELTA, SPLIT, DICT)</text>
  <text x="395" y="698" font-size="9" fill="#37474F">Columns: _ikey + typed (no blob)</text>
  <text x="395" y="716" font-size="9" fill="#E65100" font-weight="600">Bias: transitional, read+write balanced</text>

  <!-- L2+ detail -->
  <rect x="720" y="635" width="330" height="120" rx="4" fill="white" stroke="#FF9800" stroke-width="1"/>
  <text x="885" y="653" text-anchor="middle" font-size="10" font-weight="bold" fill="#E65100">L2+ (Columnstore)</text>
  <text x="735" y="670" font-size="9" fill="#37474F">Pages: 128 KiB · Row groups: 128 MiB</text>
  <text x="735" y="684" font-size="9" fill="#37474F">Int: DELTA_BINARY_PACKED</text>
  <text x="735" y="698" font-size="9" fill="#37474F">Float: BYTE_STREAM_SPLIT</text>
  <text x="735" y="712" font-size="9" fill="#37474F">String: RLE_DICTIONARY · Bool: RLE</text>
  <text x="735" y="730" font-size="9" fill="#E65100" font-weight="600">Bias: analytics scans, max compression</text>
  <text x="735" y="744" font-size="8" fill="#78909C" font-style="italic">Native format for Spark / Trino / DuckDB</text>
</svg>
